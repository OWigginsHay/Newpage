<!-- @dsCard group="Spacing" viewport="700x150" name="Radii & shadows" subtitle="Corner radii and elevation" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--surface-subtle);padding:24px}.row{display:flex;gap:20px;align-items:center}.box{width:74px;height:60px;background:#fff;display:flex;align-items:flex-end;justify-content:center}.l{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);padding:4px}</style>
</head><body>
<div class="row">
  <div class="box" style="border-radius:6px;box-shadow:var(--shadow-xs)"><span class="l">sm · xs</span></div>
  <div class="box" style="border-radius:10px;box-shadow:var(--shadow-sm)"><span class="l">md · sm</span></div>
  <div class="box" style="border-radius:16px;box-shadow:var(--shadow-md)"><span class="l">lg · md</span></div>
  <div class="box" style="border-radius:24px;box-shadow:var(--shadow-lg)"><span class="l">xl · lg</span></div>
  <div class="box" style="border-radius:999px;box-shadow:var(--shadow-teal);width:60px"><span class="l">pill</span></div>
</div>
</body></html>
