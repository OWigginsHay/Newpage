<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — space-1 → space-16" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:#fff;padding:24px}.row{display:flex;align-items:flex-end;gap:14px}.c{text-align:center}.bar{background:var(--brand-teal);border-radius:3px;width:26px}.l{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);margin-top:6px}</style>
</head><body>
<div class="row" id="r"></div>
<script>
const s=[['1',4],['2',8],['3',12],['4',16],['6',24],['8',32],['12',48],['16',64]];
document.getElementById('r').innerHTML=s.map(([n,px])=>`<div class="c"><div class="bar" style="height:${px}px"></div><div class="l">${n}<br>${px}</div></div>`).join('');
</script>
</body></html>
